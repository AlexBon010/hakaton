services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hakaton-qdrant
    # ports:
    #   - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  nest-app:
    build:
      context: .
      dockerfile: nest-app/Dockerfile
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT}:${PORT}"
    networks:
      - app-network
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  front:
    build:
      context: ./comparison-system-nextjs
      dockerfile: Dockerfile.dev
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./comparison-system-nextjs:/app
      - /app/node_modules
    ports:
      - "3333:3000"
    depends_on:
      nest-app:
        condition: service_healthy
    networks:
      - app-network

volumes:
  qdrant_data:

networks:
  app-network:
    driver: bridge
